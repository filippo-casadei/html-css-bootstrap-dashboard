<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggiungi Libro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="styles/style.css">

</head>


<body>
    <!-- HEADER DELLA PAGINA - NAVBAR-->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid">

                <a class="navbar-brand" href="#">
                    <img class="logo d-inline-block align-text-top" src="./img/duck.png"
                        alt="una paperella bianca pixellata">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo01" aria-controls="navbarTogglerDemo01" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
                    <a class="navbar-brand" href="#">Catalogo Libri</a>
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" aria-disabled="true">Help</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-light" type="submit">Cerca</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
    <!-- MAIN CONTENT DELLA PAGINA --> 
        <div class="container mt-4">
            <h1>Nuovo Libro</h1>
        </div>

    <!-- PRIMA SEZIONE RICERCA - FORM CON 3 INPUT: NOME AUTORE, COGNOME E TITOLO LIBRO-->
    <div class="container mt-4">
        <form class="row g-3">
            <div class="col-6">
                <label for="nomeAutore" class="form-label">Nome Autore</label>
                <input type="text" class="form-control" id="nomeAutore" name="nomeAutore">
            </div>
            <div class="col-6">
                <label for="cognomeAutore" class="form-label">Cognome Autore</label>
                <input type="text" class="form-control" id="cognomeAutore" name="cognomeAutore">
            </div>
            <div class="col-12">
                <label for="titoloLibro" class="form-label">Titolo</label>
                <input type="text" class="form-control" id="titoloLibro" name="titolo" placeholder="Il Signore degli Anelli">
                <div class="form-text">Titolo versione italiana</div>
            </div>
        </form>
    </div>
    
    <!-- SECONDA SEZIONE RICERCA - FORM CON 3 INPUT: GENERE, ANNO E ISBN-->

    <div class="container mt-4">
        <form class="row g-3">
            <div class="col-12 col-lg-4">
                <label for="inputState" class="form-label">Genere</label>
                    <select id="inputState" class="form-select">
                        <option selected>Scegli il genere</option>
                        <option>Abbiamo solo Fantasy</option>
                    </select>
            </div>
            <div class="col-12 col-lg-4">
                <label for="dataPubblicazione" class="form-label">Data Pubblicazione</label>
                <input type="date" class="form-control" id="dataPubblicazione" name="dataPubblicazione">
            </div>
            <div class="col-12 col-lg-4">
                <label for="codiceIsbn" class="form-label">ISBN#</label>
                <input type="text" class="form-control" id="codiceIsbn" name="CodiceIsbn" placeholder="Inserisci il codice ISBN">
            </div>
        </form>
    </div>

    <div class="container mt-4">
            <label for="textarea" class="form-label">Note</label>
            <textarea class="form-control" id="textarea" rows="5" placeholder="Inserisci eventuali note sul libro"></textarea>
    </div>




    </main>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>

</body>
</html>
